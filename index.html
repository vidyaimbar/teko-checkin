<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEKO QR Check-In v1.3</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
*{box-sizing:border-box}
body{margin:0;padding:12px;background:#0f1115;color:white;font-family:Arial,sans-serif}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.title{font-size:25px;font-weight:bold}.subtitle{color:#9ca3af;font-size:12px}
.wrap{display:grid;grid-template-columns:420px 1fr;gap:14px;align-items:start}
.box,.status-card{background:#171b23;border:1px solid #2f3643;border-radius:18px;padding:14px}.status-card{box-shadow:0 18px 48px rgba(0,0,0,.25)}
#reader{width:100%;overflow:hidden;border-radius:14px;background:#0f1115;min-height:280px;color:#64748b}
.field{margin-bottom:10px}.label{color:#9ca3af;font-size:12px;margin-bottom:4px}
.value{font-size:22px;font-weight:bold}.small{font-size:14px;color:#cbd5e1;word-break:break-word}
button{border:0;border-radius:10px;padding:11px 14px;font-weight:bold;cursor:pointer}
.btn{background:#263244;color:white;border:1px solid #3b4658}.start{background:#2563eb;color:white}.front{background:#7c3aed;color:white}.stop{background:#dc2626;color:white}.manual{background:#0891b2;color:white}.save{background:#16a34a;color:white}.full{background:#f59e0b;color:#111827}
input{width:100%;padding:12px;background:#0f1115;border:1px solid #2f3643;border-radius:12px;color:white;font-size:15px}
.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}.status-card{margin-top:14px}
.state{font-size:38px;font-weight:900;margin-bottom:14px;line-height:1.05;letter-spacing:.3px}
.READY{color:#93c5fd}.VALID{color:#22c55e}.ALREADY,.REFUND_REQUESTED{color:#f59e0b}.CANCELLED,.REFUNDED,.INVALID,.ERROR{color:#ef4444}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;font-weight:bold;font-size:12px}.b-valid{background:#14532d;color:#bbf7d0}.b-warn{background:#854d0e;color:#fde68a}.b-error{background:#7f1d1d;color:#fecaca}
.scanlog{margin-top:14px;max-height:230px;overflow:auto}.logitem{padding:10px 0;border-bottom:1px solid #2f3643;color:#cbd5e1;font-size:13px}
.hint{font-size:12px;color:#94a3b8;line-height:1.5;margin-top:8px}.config{margin-bottom:14px}
.desktop-result{display:block}.mobile-status{display:none}
.fullscreen-mode{position:fixed!important;inset:0!important;z-index:9999!important;margin:0!important;border-radius:0!important;padding:30px!important;display:flex!important;flex-direction:column!important;justify-content:center!important;background:#0f1115!important}
.fullscreen-mode .state{font-size:56px}.fullscreen-mode .value{font-size:34px}.fullscreen-mode .small{font-size:22px}
@media(max-width:900px){body{padding:10px}.wrap{grid-template-columns:1fr}.title{font-size:23px}.desktop-result{display:none}.mobile-status{display:block}.config{display:none}.status-card{margin-top:12px;padding:20px 14px;border-width:2px}.state{font-size:36px}.value{font-size:24px}.small{font-size:16px}.scanlog{max-height:150px}.field{margin-bottom:8px}#reader{min-height:270px}}
</style>
</head>
<body>
<div class="header"><div><div class="title">TEKO QR CHECK-IN</div><div class="subtitle">Scanner v1.3 + anti spam + cancel/refund status</div></div><button class="btn" onclick="resetResult()">RESET</button></div>

<div class="wrap">
  <div class="box">
    <div class="field"><div class="label">Petugas / Gate</div><input id="petugas" value="Gate A" placeholder="Contoh: Gate A / Admin 1"></div>
    <div class="actions"><button class="start" onclick="startBackCamera()">START BACK CAMERA</button><button class="front" onclick="startFrontCamera()">FRONT CAMERA</button><button class="stop" onclick="stopScanner()">STOP</button></div>
    <div class="hint">Setelah QR terbaca, scanner pause otomatis supaya hasil tidak menumpuk.</div>
    <div style="height:12px"></div>
    <div id="reader">Camera preview akan tampil di sini</div>
    <div id="mobileStatusMount" class="mobile-status"></div>
    <div class="field" style="margin-top:14px"><div class="label">Manual Kode Tiket</div><input id="manualKode" placeholder="Contoh: TKT-2026-0006"></div>
    <div class="actions"><button class="manual" onclick="manualCheckin()">CHECK-IN MANUAL</button></div>
    <div class="scanlog" id="scanLog"></div>
  </div>
  <div class="desktop-result" id="desktopStatusMount"></div>
</div>

<template id="statusTemplate">
  <div id="statusCard" class="status-card">
    <div id="state" class="state READY">READY TO SCAN</div>
    <div class="field"><div class="label">Status</div><div id="statusText" class="value">Isi Web App URL, lalu klik START BACK CAMERA.</div></div>
    <div class="field"><div class="label">Nama</div><div id="nama" class="value">-</div></div>
    <div class="field"><div class="label">Event</div><div id="event" class="value">-</div></div>
    <div class="field"><div class="label">Kode Tiket</div><div id="kodeTiket" class="small">-</div></div>
    <div class="field"><div class="label">Kode Daftar</div><div id="kodeDaftar" class="small">-</div></div>
    <div class="field"><div class="label">Check-In Time</div><div id="checkinTime" class="small">-</div></div>
    <div class="field"><div class="label">Check-In By</div><div id="checkinBy" class="small">-</div></div>
    <div class="actions"><button class="full" onclick="toggleStatusFullscreen()">FULL SCREEN STATUS</button></div>
  </div>
</template>

<script>
let html5QrCode=null,scannerRunning=false,scanLocked=false,lastScannedCode="",lastScannedTime=0;
const TEKO_WEB_APP_URL ="https://script.google.com/macros/s/AKfycbz0h8bcQDk6Gigj9jC_Zw-CFl9uvnSt4v7BbYvG7m4Jr6Sytwrp1EOFVTu5K8VXqp4N/exec";
const SCAN_COOLDOWN_MS = 1200;
const SAME_CODE_IGNORE_MS = 3000;

function mountStatusCard(){const tpl=document.getElementById("statusTemplate").content.cloneNode(true);if(window.matchMedia("(max-width: 900px)").matches){document.getElementById("mobileStatusMount").appendChild(tpl)}else{document.getElementById("desktopStatusMount").appendChild(tpl)}}
function getWebAppUrl(){return TEKO_WEB_APP_URL;}
function startBackCamera(){startScannerWithFacingMode("environment")}
function startFrontCamera(){startScannerWithFacingMode("user")}
function startScannerWithFacingMode(facingMode){
  if(scannerRunning)return;

  if(typeof Html5Qrcode==="undefined"){
    showError("Library html5-qrcode gagal dimuat. Cek koneksi internet.");
    return;
  }

  html5QrCode = new Html5Qrcode("reader");
  setReady("Mencari kamera...");

  Html5Qrcode.getCameras().then(cameras=>{
    if(!cameras || cameras.length===0){
      showError("Kamera tidak ditemukan.");
      return;
    }

    let selectedCamera = cameras[0].id;

    if(facingMode==="environment"){
      const backCam = cameras.find(c =>
        String(c.label || "").toLowerCase().includes("back") ||
        String(c.label || "").toLowerCase().includes("rear") ||
        String(c.label || "").toLowerCase().includes("environment")
      );
      if(backCam) selectedCamera = backCam.id;
      else selectedCamera = cameras[cameras.length - 1].id;
    }

    if(facingMode==="user"){
      const frontCam = cameras.find(c =>
        String(c.label || "").toLowerCase().includes("front") ||
        String(c.label || "").toLowerCase().includes("user")
      );
      if(frontCam) selectedCamera = frontCam.id;
    }

    setReady("Membuka kamera...");

    return html5QrCode.start(
      selectedCamera,
      {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      },
      onScanSuccess,
      onScanFailure
    );

  }).then(()=>{
    scannerRunning = true;
    setReady("Scanner aktif. Arahkan kamera ke QR tiket.");
  }).catch(err=>{
    showError("Gagal membuka kamera: " + readableCameraError(err));
  });
}
function readableCameraError(err){const msg=String(err||"");if(msg.includes("NotAllowedError")||msg.includes("Permission"))return"Permission kamera ditolak. Cek izin kamera browser.";if(msg.includes("NotFoundError"))return"Kamera tidak ditemukan.";if(msg.includes("NotReadableError"))return"Kamera sedang dipakai aplikasi lain. Tutup kamera/WA/Zoom lalu coba lagi.";if(msg.includes("OverconstrainedError"))return"Kamera belakang tidak cocok. Coba FRONT CAMERA.";return msg}
function stopScanner(){if(!html5QrCode||!scannerRunning){setReady("Scanner belum aktif.");return}html5QrCode.stop().then(()=>{scannerRunning=false;html5QrCode.clear();html5QrCode=null;setReady("Scanner dihentikan.")}).catch(err=>showError("Gagal stop scanner: "+err))}
function onScanFailure(error){}
function onScanSuccess(decodedText){const now=Date.now();if(scanLocked)return;const kodeTiket=extractKodeTiket(decodedText);if(!kodeTiket){scanLocked=true;playBeep("invalid");showInvalid({message:"QR tidak valid. Kode tiket tidak ditemukan."});setTimeout(()=>scanLocked=false,SCAN_COOLDOWN_MS);return}if(kodeTiket===lastScannedCode&&(now-lastScannedTime)<SAME_CODE_IGNORE_MS)return;lastScannedCode=kodeTiket;lastScannedTime=now;scanLocked=true;doCheckin(kodeTiket)}
function manualCheckin(){const kode=document.getElementById("manualKode").value.trim();if(!kode){showError("Masukkan kode tiket dulu.");playBeep("invalid");return}scanLocked=true;doCheckin(kode)}
function doCheckin(kodeTiket){const webAppUrl=getWebAppUrl();if(!webAppUrl){showError("Web App URL belum diisi.");playBeep("invalid");scanLocked=false;return}const petugas=document.getElementById("petugas").value.trim()||"Gate";setProcessing(kodeTiket);callTekoApiJsonp(webAppUrl,kodeTiket,petugas).then(res=>{renderCheckinResult(res);addLog(res);if(res.result==="VALID")playBeep("valid");else if(res.result==="ALREADY_CHECKED_IN"||res.result==="REFUND_REQUESTED")playBeep("already");else playBeep("invalid");setTimeout(()=>scanLocked=false,SCAN_COOLDOWN_MS)}).catch(err=>{showError(err.message||err);playBeep("invalid");setTimeout(()=>scanLocked=false,SCAN_COOLDOWN_MS)})}
function callTekoApiJsonp(webAppUrl,kodeTiket,petugas){return new Promise((resolve,reject)=>{const callbackName="teko_cb_"+Date.now()+"_"+Math.floor(Math.random()*100000);let script=null;const timeout=setTimeout(()=>{cleanup();reject(new Error("Timeout memanggil TEKO API."))},20000);function cleanup(){clearTimeout(timeout);delete window[callbackName];if(script&&script.parentNode)script.parentNode.removeChild(script)}window[callbackName]=data=>{cleanup();resolve(data)};const sep=webAppUrl.includes("?")?"&":"?";const url=webAppUrl+sep+"api=checkin&kodeTiket="+encodeURIComponent(kodeTiket)+"&petugas="+encodeURIComponent(petugas)+"&callback="+encodeURIComponent(callbackName)+"&_="+Date.now();script=document.createElement("script");script.src=url;script.onerror=()=>{cleanup();reject(new Error("Gagal memanggil TEKO API. Cek URL Web App / deploy permission."))};document.body.appendChild(script)})}
function extractKodeTiket(text){const raw=String(text||"").trim();if(!raw)return"";try{const obj=JSON.parse(raw);if(obj.kodeTiket)return String(obj.kodeTiket).trim()}catch(e){}const match=raw.match(/TKT-\d{4}-\d{4}/i);if(match)return match[0].toUpperCase();return raw}
function renderCheckinResult(res){
  if(!res){showError("Response kosong dari server.");return}
  document.getElementById("nama").innerText=res.nama||"-";
  document.getElementById("event").innerText=res.namaEvent||"-";
  document.getElementById("kodeTiket").innerText=res.kodeTiket||"-";
  document.getElementById("kodeDaftar").innerText=res.kodeDaftar||"-";
  document.getElementById("checkinTime").innerText=res.checkinTime||"-";
  document.getElementById("checkinBy").innerText=res.checkinBy||"-";

  const state=document.getElementById("state"),statusText=document.getElementById("statusText");
  const result=String(res.result||"").toUpperCase();
  state.className="state";

  if(result==="VALID"){
    state.classList.add("VALID");
    state.innerText="✓ CHECK-IN SUCCESS";
    statusText.innerHTML='<span class="badge b-valid">VALID TICKET</span>';
  }else if(result==="ALREADY_CHECKED_IN"){
    state.classList.add("ALREADY");
    state.innerText="⚠ SUDAH CHECK-IN";
    statusText.innerHTML='<span class="badge b-warn">ALREADY USED</span>';
  }else if(result==="CANCELLED"){
    state.classList.add("CANCELLED");
    state.innerText="✕ ORDER CANCELLED";
    statusText.innerHTML='<span class="badge b-error">ORDER DIBATALKAN</span>';
  }else if(result==="REFUND_REQUESTED"){
    state.classList.add("REFUND_REQUESTED");
    state.innerText="⚠ REFUND PROCESS";
    statusText.innerHTML='<span class="badge b-warn">SEDANG PROSES REFUND</span>';
  }else if(result==="REFUNDED"){
    state.classList.add("REFUNDED");
    state.innerText="✕ TICKET REFUNDED";
    statusText.innerHTML='<span class="badge b-error">TIKET SUDAH DIREFUND</span>';
  }else{
    state.classList.add("INVALID");
    state.innerText="✕ INVALID TICKET";
    statusText.innerHTML='<span class="badge b-error">'+safe(res.message||"INVALID")+"</span>";
  }
}
function setProcessing(kode){const state=document.getElementById("state");state.className="state READY";state.innerText="PROCESSING...";document.getElementById("statusText").innerText="Mengecek tiket "+kode+"..."}
function setReady(msg){const state=document.getElementById("state");state.className="state READY";state.innerText="READY TO SCAN";document.getElementById("statusText").innerText=msg||"Menunggu scan QR..."}
function showError(msg){const state=document.getElementById("state");state.className="state ERROR";state.innerText="ERROR";document.getElementById("statusText").innerHTML='<span class="badge b-error">'+safe(msg)+"</span>"}
function showInvalid(data){const state=document.getElementById("state");state.className="state INVALID";state.innerText="✕ INVALID QR";document.getElementById("statusText").innerHTML='<span class="badge b-error">'+safe(data.message||"Invalid QR")+"</span>"}
function resetResult(){scanLocked=false;lastScannedCode="";lastScannedTime=0;setReady("Menunggu scan QR...");document.getElementById("nama").innerText="-";document.getElementById("event").innerText="-";document.getElementById("kodeTiket").innerText="-";document.getElementById("kodeDaftar").innerText="-";document.getElementById("checkinTime").innerText="-";document.getElementById("checkinBy").innerText="-"}
function addLog(res){const log=document.getElementById("scanLog");const div=document.createElement("div");div.className="logitem";div.innerHTML="<b>"+safe(res.result||"-")+"</b> - "+safe(res.kodeTiket||"-")+" - "+safe(res.nama||"-")+" - "+safe(res.namaEvent||"-");log.prepend(div);while(log.children.length>12)log.removeChild(log.lastChild)}
function toggleStatusFullscreen(){document.getElementById("statusCard").classList.toggle("fullscreen-mode")}
function playBeep(type){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);gain.gain.value=0.08;if(type==="valid"){osc.frequency.value=880;osc.start();setTimeout(()=>{osc.stop();ctx.close()},130)}else if(type==="already"){osc.frequency.value=520;osc.start();setTimeout(()=>osc.frequency.value=390,130);setTimeout(()=>{osc.stop();ctx.close()},280)}else{osc.frequency.value=220;gain.gain.value=0.09;osc.start();setTimeout(()=>{osc.stop();ctx.close()},350)}}catch(e){}}
function safe(v){return String(v??"").replace(/[<>&"]/g,s=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[s]))}
mountStatusCard();
</script>
</body>
</html>
